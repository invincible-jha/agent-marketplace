openapi: "3.1.0"

info:
  title: Agent Marketplace API
  version: "0.2.0"
  description: |
    HTTP API for the agent-marketplace server. Provides endpoints for
    registering agent capabilities, searching the capability catalog,
    and retrieving individual capability details.
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:8085
    description: Local development server

tags:
  - name: capabilities
    description: Register and retrieve marketplace capability listings
  - name: search
    description: Search the capability catalog
  - name: health
    description: Server health check

paths:
  /register:
    post:
      tags: [capabilities]
      operationId: registerCapability
      summary: Register a new capability
      description: |
        Registers a new agent capability in the marketplace. Returns
        the assigned capability_id and any validation warnings.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterCapabilityRequest"
            example:
              name: "document-summarizer"
              version: "1.2.0"
              description: "Summarize long documents into concise bullet points"
              category: "nlp"
              tags: ["summarization", "nlp", "text"]
              input_types: ["text/plain", "text/markdown", "application/pdf"]
              output_type: "text/plain"
              pricing_model: "per_call"
              cost: 0.002
              supported_languages: ["en", "es", "fr"]
              supported_frameworks: ["langchain", "autogen"]
              provider:
                name: "AumOS NLP Team"
                contact: "nlp@aumos.ai"
              quality_metrics:
                accuracy: "0.94"
                avg_latency_ms: "320"
      responses:
        "201":
          description: Capability registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
              example:
                capability_id: "cap-550e8400-e29b-41d4"
                registered: true
                warnings: []
        "400":
          description: Registration failed due to invalid data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Registration failed"
                detail: "Capability name is required."
        "422":
          description: Validation error in request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /capabilities/{capability_id}:
    get:
      tags: [capabilities]
      operationId: getCapability
      summary: Get details for a specific capability
      description: Returns the full capability record for the given capability_id.
      parameters:
        - name: capability_id
          in: path
          required: true
          description: Identifier of the capability to retrieve
          schema:
            type: string
          example: "cap-550e8400-e29b-41d4"
      responses:
        "200":
          description: Capability found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapabilityResponse"
              example:
                capability_id: "cap-550e8400-e29b-41d4"
                name: "document-summarizer"
                version: "1.2.0"
                description: "Summarize long documents into concise bullet points"
                category: "nlp"
                tags: ["summarization", "nlp"]
                input_types: ["text/plain", "application/pdf"]
                output_type: "text/plain"
                pricing_model: "per_call"
                cost: 0.002
                trust_level: 0.85
                supported_languages: ["en", "es"]
                supported_frameworks: ["langchain"]
        "404":
          description: Capability not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Not found"
                detail: "Capability 'cap-unknown' not found."

  /search:
    get:
      tags: [search]
      operationId: searchCapabilities
      summary: Search capabilities by keyword
      description: |
        Searches the marketplace for capabilities matching the given keyword
        across name, description, and tags. Optionally filtered by category.
      parameters:
        - name: q
          in: query
          required: false
          description: Free-text search keyword
          schema:
            type: string
          example: "summariz"
        - name: category
          in: query
          required: false
          description: Filter by capability category
          schema:
            type: string
          example: "nlp"
        - name: limit
          in: query
          required: false
          description: Maximum number of results to return (default 20)
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 200
          example: 10
        - name: offset
          in: query
          required: false
          description: Number of results to skip for pagination
          schema:
            type: integer
            default: 0
            minimum: 0
          example: 0
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
              example:
                query: "summariz"
                results:
                  - capability_id: "cap-550e8400-e29b-41d4"
                    name: "document-summarizer"
                    version: "1.2.0"
                    description: "Summarize long documents into concise bullet points"
                    category: "nlp"
                    tags: ["summarization"]
                    input_types: ["text/plain"]
                    output_type: "text/plain"
                    pricing_model: "per_call"
                    cost: 0.002
                    trust_level: 0.85
                    supported_languages: ["en"]
                    supported_frameworks: ["langchain"]
                total: 1
                limit: 20
                offset: 0
        "400":
          description: Search failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /health:
    get:
      tags: [health]
      operationId: getHealth
      summary: Health check
      description: Returns server status and current registered capability count.
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: "ok"
                service: "agent-marketplace"
                version: "0.1.0"
                capability_count: 17

components:
  schemas:
    RegisterCapabilityRequest:
      type: object
      description: Request body for registering a new marketplace capability.
      required: [name, version, description, category]
      properties:
        name:
          type: string
          description: Unique short name for the capability
        version:
          type: string
          description: Semantic version string (e.g. "1.2.0")
        description:
          type: string
          description: Human-readable description of what the capability does
        category:
          type: string
          description: Category label (e.g. "nlp", "vision", "code", "data")
        tags:
          type: array
          items:
            type: string
          default: []
          description: Searchable tags
        input_types:
          type: array
          items:
            type: string
          default: []
          description: MIME types or data type labels accepted as input
        output_type:
          type: string
          default: ""
          description: MIME type or data type label produced as output
        pricing_model:
          type: string
          default: "free"
          description: Pricing model
          enum: [free, per_call, per_token, subscription, custom]
        cost:
          type: number
          format: double
          default: 0.0
          description: Cost per unit (interpretation depends on pricing_model)
        supported_languages:
          type: array
          items:
            type: string
          default: []
          description: ISO 639-1 language codes supported
        supported_frameworks:
          type: array
          items:
            type: string
          default: []
          description: Agent frameworks this capability integrates with
        provider:
          type: object
          additionalProperties: true
          default: {}
          description: Provider metadata (name, contact, endpoint, etc.)
        quality_metrics:
          type: object
          additionalProperties: true
          default: {}
          description: Quality metric key-value pairs (accuracy, latency, etc.)

    CapabilityResponse:
      type: object
      description: Marketplace capability listing.
      required:
        - capability_id
        - name
        - version
        - description
        - category
        - output_type
        - pricing_model
        - cost
        - trust_level
      properties:
        capability_id:
          type: string
          description: Unique identifier assigned at registration
        name:
          type: string
        version:
          type: string
        description:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
          default: []
        input_types:
          type: array
          items:
            type: string
          default: []
        output_type:
          type: string
        pricing_model:
          type: string
        cost:
          type: number
          format: double
        trust_level:
          type: number
          format: double
          description: Trust score in [0.0, 1.0] assigned by the marketplace
        supported_languages:
          type: array
          items:
            type: string
          default: []
        supported_frameworks:
          type: array
          items:
            type: string
          default: []

    SearchResponse:
      type: object
      description: Capability search results with pagination metadata.
      required: [query, results, total, limit, offset]
      properties:
        query:
          type: string
          description: Search keyword used
        results:
          type: array
          items:
            $ref: "#/components/schemas/CapabilityResponse"
        total:
          type: integer
          description: Total number of matching capabilities
        limit:
          type: integer
          description: Page size used in this response
        offset:
          type: integer
          description: Number of results skipped

    RegisterResponse:
      type: object
      description: Confirmation of successful capability registration.
      required: [capability_id, registered]
      properties:
        capability_id:
          type: string
          description: Assigned capability identifier
        registered:
          type: boolean
          default: true
        warnings:
          type: array
          items:
            type: string
          default: []
          description: Non-fatal validation warnings from the registration process

    HealthResponse:
      type: object
      description: Server health information.
      required: [status, service, version, capability_count]
      properties:
        status:
          type: string
          default: "ok"
        service:
          type: string
          default: "agent-marketplace"
        version:
          type: string
          default: "0.1.0"
        capability_count:
          type: integer
          description: Number of registered capabilities in the catalog

    ErrorResponse:
      type: object
      description: Standard error response body.
      required: [error]
      properties:
        error:
          type: string
        detail:
          type: string
          default: ""
